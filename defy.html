<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Detector 💖</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Comic Sans MS', cursive;
}

/* 💗 EXACT BACKGROUND */
body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

/* 👇 put your image path here */
background-image: url("heart.jpg");
background-size: cover;
background-position: center;
}

/* card */
.container{
background:rgba(0,0,0,0.75);
padding:25px;
border-radius:25px;
max-width:400px;
width:100%;
text-align:center;
border:2px dashed #ff9ecb;
box-shadow:0 0 30px rgba(255,105,180,0.5);
color:white;
backdrop-filter:blur(8px);
}

h1{
color:#ff4d88;
margin-bottom:15px;
}

/* button */
button{
background:#ff4d88;
color:white;
border:none;
padding:12px;
border-radius:30px;
cursor:pointer;
width:100%;
margin-bottom:15px;
transition:0.2s;
}

button:disabled{
background:#ccc;
cursor:not-allowed;
}

/* webcam */
#webcam-container canvas{
border-radius:15px;
border:3px solid #ff9ecb;
}

/* predictions */
.prediction{
background:#2b1a22;
padding:10px;
margin-top:10px;
border-radius:20px;
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">
<h1>💖 Detector 💖</h1>

<button id="startBtn" onclick="init()">Start Camera</button>

<div id="webcam-container"></div>
<div id="label-container"></div>
</div>

<script>
const URL="./my_model/";

let model, webcam, labelContainer, maxPredictions;
let started=false;

async function init(){

if(started) return;
started=true;

document.getElementById("startBtn").disabled=true;
document.getElementById("startBtn").innerText="Camera Started 💖";

const modelURL=URL+"model.json";
const metadataURL=URL+"metadata.json";

model=await tmImage.load(modelURL,metadataURL);
maxPredictions=model.getTotalClasses();

webcam=new tmImage.Webcam(250,250,true);

await webcam.setup();
await webcam.play();

window.requestAnimationFrame(loop);

document.getElementById("webcam-container").appendChild(webcam.canvas);

labelContainer=document.getElementById("label-container");

for(let i=0;i<maxPredictions;i++){
let div=document.createElement("div");
div.className="prediction";
labelContainer.appendChild(div);
}
}

async function loop(){
webcam.update();
await predict();
window.requestAnimationFrame(loop);
}

async function predict(){
const prediction=await model.predict(webcam.canvas);

for(let i=0;i<maxPredictions;i++){
labelContainer.childNodes[i].innerHTML=
`<span>${prediction[i].className}</span>
<span>💘 ${(prediction[i].probability*100).toFixed(1)}%</span>`;
}
}
</script>

</body>
</html>
