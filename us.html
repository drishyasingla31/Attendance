<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Comic Sans MS', 'Segoe UI', cursive;
    }

    body {
        background: #fff0f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
    }

    /* Floating hearts background */
    body::before {
        content: "💖 💕 💗 💓 💞 💘";
        position: absolute;
        font-size: 40px;
        animation: float 15s linear infinite;
        opacity: 0.2;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh);
        }

        100% {
            transform: translateY(-100vh);
        }
    }

    .container {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 25px;
        padding: 30px;
        max-width: 450px;
        width: 100%;
        text-align: center;
        box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
        border: 2px dashed #ff9ecb;
        animation: popIn 0.8s ease;
    }

    @keyframes popIn {
        from {
            transform: scale(0.8);
            opacity: 0;
        }

        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    h1 {
        font-size: 26px;
        margin-bottom: 20px;
        color: #ff4d88;
    }

    /* Cute button */
    button {
        background: #ff4d88;
        color: white;
        border: none;
        padding: 12px 25px;
        font-size: 16px;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(255, 77, 136, 0.4);
    }

    button:hover {
        transform: scale(1.1) rotate(-2deg);
        background: #ff3385;
    }

    /* Webcam */
    #webcam-container {
        margin: 20px auto;
        display: flex;
        justify-content: center;
    }

    #webcam-container canvas {
        border-radius: 20px;
        border: 3px solid #ff9ecb;
        box-shadow: 0 5px 20px rgba(255, 105, 180, 0.4);
    }

    /* Predictions */
    #label-container {
        margin-top: 20px;
    }

    .prediction {
        background: #ffe6f0;
        padding: 10px 15px;
        border-radius: 20px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 3px 10px rgba(255, 105, 180, 0.2);
        animation: fadeIn 0.5s ease;
    }

    .prediction::before {
        content: "💗";
        margin-right: 8px;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Responsive */
    @media(max-width:500px) {
        h1 {
            font-size: 20px;
        }

        button {
            width: 100%;
        }
    }
</style>
